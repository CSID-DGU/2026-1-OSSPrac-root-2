<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>팀페이지 제작</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="page">

    <header class="navbar">
        <div class="nav-inner">
            <div class="logo">OSSPrac</div>

            <nav class="nav-menu">
                <a href="/">Root팀 소개</a>
                <a href="/community">커뮤니티</a>
                <a href="/input" class="active">팀페이지 제작</a>
                <a href="/contact">Contact</a>
            </nav>
        </div>
    </header>

    <div class="input-container">

        <h1 class="input-title">팀 프로필 정보 입력</h1>

        <form action="/result" method="get" enctype="multipart/form-data">

            <section class="form-card">
                <h2>팀 정보</h2>

                <label>팀명</label>
                <input type="text" name="team_name" placeholder="팀명을 입력하세요">

                <label>팀 한 줄 소개</label>
                <input type="text" name="team_intro" placeholder="팀 소개를 입력하세요">

                <label>팀 대표 사진</label>
                <div class="file-row">
                    <input type="file" name="team_image">
                </div>

            </section>

            <section class="form-card">
                <h2>팀원 정보</h2>

                <div class="form-grid">
                    <div>
                        <label>이름</label>
                        <input type="text" name="name">
                    </div>

                    <div>
                        <label>학번</label>
                        <input type="text" name="student_id">
                    </div>

                    <div>
                        <label>전공</label>
                        <input type="text" name="major">
                    </div>

                    <div>
                        <label>핸드폰</label>
                        <input type="text" name="phone">
                    </div>

                    <div>
                        <label>이메일</label>
                        <input type="email" name="email">
                    </div>
                </div>

                <div class="option-area">
                    <div>
                        <label>성별</label>
                        <div class="radio-row">
                            <label><input type="radio" name="gender" value="남자"> 남자</label>
                            <label><input type="radio" name="gender" value="여자"> 여자</label>
                        </div>
                    </div>

                    <div>
                        <label>역할</label>
                        <div class="radio-row">
                            <label><input type="radio" name="role" value="팀장"> 팀장</label>
                            <label><input type="radio" name="role" value="팀원"> 팀원</label>
                        </div>
                    </div>
                </div>

                <label>프로그래밍 언어</label>
                <div class="radio-row language-row">
                    <label><input type="radio" name="language" value="Python"> Python</label>
                    <label><input type="radio" name="language" value="Java"> Java</label>
                    <label><input type="radio" name="language" value="C/C++"> C/C++</label>
                    <label><input type="radio" name="language" value="HTML/CSS"> C/C++</label>
                    <label><input type="radio" name="language" value="SQL"> C/C++</label>
                    <label class="etc-language">
                        <input type="radio" name="language" value="etc" id="etc-radio">
                        <input type="text" id="etc-input" placeholder="직접 입력"></label>
                </div>

                <label>프로필 사진</label>
                <div class="file-row">
                    <input type="file" name="profile_image">
                </div>

            </section>
            <div class="form-buttons">
                <button type="button" class="btn-light"
                   onclick="location.href='{{ url_for('home') }}'">홈
                </button>
                <button type="button" class="btn-outline" onclick="addMember()">팀원 추가</button>
                <button type="submit" class="btn-purple">제출하기</button>
            </div>

        </form>
    </div>
</div>
<script>
let memberCount = 0;

function addMember() {
    if (memberCount >= 4) {
        alert("팀원은 최대 4명까지 추가할 수 있습니다.");
        return;
    }

    memberCount++;

    alert(memberCount + "번째 팀원이 추가되었습니다.");

    if (memberCount === 4) {
        document.querySelector(".btn-outline").disabled = true;
        document.querySelector(".btn-outline").textContent = "최대 4명 추가 완료";
    }

    // 다음 팀원 입력할 수 있게 팀원 정보 입력칸만 비우기
    const memberInputs = document.querySelectorAll(
        '.form-card:nth-of-type(2) input'
    );

    memberInputs.forEach(input => {
        if (input.type === "radio") {
            input.checked = false;
        } else if (input.type === "file") {
            input.value = "";
        } else {
            input.value = "";
        }
    });
}
</script>
</body>
</html>
