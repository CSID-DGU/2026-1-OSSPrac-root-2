<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{% if post %}게시글 수정{% else %}새 글 작성{% endif %} - ROOT</title>
</head>
<body>
    <h2>{% if post %}게시글 수정{% else %}새 글 작성{% endif %}</h2>
    <hr>
    
    <form action="/board/update" method="POST">
        
        {% if post %}
            <input type="hidden" name="post_id" value="{{ post.id }}">
        {% endif %}

        <p>
            <label>제목: </label><br>
            <input type="text" name="title" value="{{ post.title if post else '' }}" required style="width: 100%;">
        </p>

        <p>
            <label>작성자: </label><br>
            {% if post %}
                <strong>{{ post.author }}</strong>
                <input type="hidden" name="author" value="{{ post.author }}">
            {% else %}
                <input type="text" name="author" required>
            {% endif %}
        </p>

        <p>
            <label>비밀번호(4자리): </label><br>
            <input type="password" name="password" placeholder="숫자 4자리" maxlength="4" pattern="\d{4}" required>
            <small style="color: gray;">
                {% if post %}수정/삭제를 위해 기존 비밀번호를 입력하세요.{% else %}관리용 비밀번호를 설정하세요.{% endif %}
            </small>
        </p>

        <p>
            <label>내용: </label><br>
            <textarea name="content" rows="10" style="width: 100%; white-space: pre-wrap;" required>{{ post.content if post else '' }}</textarea>
        </p>

        <hr>
        
        {% if post %}
            <button type="submit" name="action" value="edit">수정 완료</button>
            <button type="submit" name="action" value="delete" onclick="return confirm('정말 삭제하시겠습니까?')">이 게시글 삭제하기</button>
        {% else %}
            <button type="submit" name="action" value="add">등록하기</button>
        {% endif %}

        <a href="javascript:history.back()">
            <button type="button">취소</button>
        </a>
    </form>
</body>
</html>
